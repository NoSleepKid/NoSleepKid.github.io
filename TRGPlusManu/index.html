<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRG Plus - NoSleepKid.io</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mainfont&display=swap">
    <style>
        @font-face {
            font-family: 'Damifontcolour-Regular';
            src: url('Damifontcolour-Regular.ttf') format('truetype');
        }

        body {
            background-image: url('bg.png');
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Damifontcolour-Regular', sans-serif;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .main-content {
            cursor: pointer;
            font-size: 20px;
        }

        .testing-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        .testing-text {
            background-color: #4CAF50;
            color: white;
            padding: 20px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 40px;
            margin-top: 20px;
            cursor: pointer;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Damifontcolour-Regular', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        .game-iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            border: none;
        }
    </style>
</head>
<body>
    <!-- Main content of main.html -->
    <div class="game-container">
        <iframe class="game-iframe" src="WebGLUnity/index.html"></iframe>
    </div>
</body>
</html>
