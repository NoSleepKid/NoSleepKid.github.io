<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameNet - NoSleepKid.io</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mainfont&display=swap">
    <style>
        body {
            background-image: url('bg.png');
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Mainfont', sans-serif;
            position: relative;
        }
        
        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header .main-content {
            cursor: pointer;
            font-size: 20px;
        }
        
        .header .feed-title {
            position: absolute;
            top: 120px; /* Moved down by 100px */
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
        }
        
        .testing-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        
        .image-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }
        
        .image-container img {
            margin: 5px;
            max-width: 200px;
            max-height: 200px;
        }
    </style>
</head>
<body>
    <!-- Include header -->
    <div class="header">
        <div class="main-content" onclick="window.location.href = 'main.html';">GameNet: PROJECT-SPACE Photo Feed</div>
        <button class="testing-btn" onclick="window.location.href = 'index.html';">Home</button>
        <div class="feed-title">Feed</div>
    </div>
    <!-- Main content of main.html -->
    <div class="image-container" id="imageContainer">
        <!-- Images will be loaded here dynamically -->
    </div>

    <script>
        window.onload = function() {
            loadImages();
        }

        function loadImages() {
            var container = document.getElementById("imageContainer");
            var folderPath = "PSFeed/"; // Path to the folder containing images
            var xhr = new XMLHttpRequest();
            xhr.open("GET", folderPath, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var files = xhr.responseText.split("\n");
                    for (var i = 0; i < files.length; i++) {
                        var fileName = files[i].trim();
                        if (fileName !== "") {
                            var img = document.createElement("img");
                            img.src = folderPath + fileName;
                            container.appendChild(img);
                        }
                    }
                }
            };
            xhr.send();
        }
    </script>
</body>
</html>
