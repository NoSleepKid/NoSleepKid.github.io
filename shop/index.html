<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop - Nuk Studios</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #000000, #1a1a1a);
            color: white;
            text-align: center;
        }
        header {
            background: #1e1e1e;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .content {
            margin-top: 50px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }
        .product {
            display: inline-block;
            background: #222;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5);
            max-width: 250px;
        }
        .product img {
            width: 100%;
            border-radius: 5px;
        }
        .product img[onerror] {
            background: red;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            height: 150px;
        }
        .buy-button {
            background: #333;
            border: 2px solid #444;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }
        .buy-button:hover {
            background: #555;
            border-color: #666;
            transform: scale(1.05);
        }
    </style>
    <script>
        function viewProduct(name, price, desc, image) {
            document.getElementById('productView').innerHTML = `
                <h2>${name}</h2>
                <img src="${image}" alt="${name}" onerror="this.style.background='red'; this.innerHTML='Offline';">
                <p>${desc}</p>
                <p><strong>$${price}</strong></p>
                <button class="buy-button">Buy Now</button>
                <br><br>
                <button onclick="closeView()">Close</button>
            `;
            document.getElementById('productView').style.display = 'block';
        }
        function closeView() {
            document.getElementById('productView').style.display = 'none';
        }
    </script>
</head>
<body>
    <header>
        <button onclick="window.location.href='https://nukstudios.xyz'">Back</button>
        <span>Shop</span>
    </header>
    <div class="content">
        <h1>Our Products</h1>
        <div class="product" onclick="viewProduct('Product 1', '19.99', 'This is an awesome product.', 'product1.jpg')">
            <img src="product1.jpg" alt="Product 1" onerror="this.style.background='red'; this.innerHTML='Offline';">
            <h2>Product 1</h2>
            <p>$19.99</p>
        </div>
        <div class="product" onclick="viewProduct('Product 2', '29.99', 'This is another great item.', 'product2.jpg')">
            <img src="product2.jpg" alt="Product 2" onerror="this.style.background='red'; this.innerHTML='Offline';">
            <h2>Product 2</h2>
            <p>$29.99</p>
        </div>
        <div class="product" onclick="viewProduct('Product 3', '39.99', 'A premium quality product.', 'product3.jpg')">
            <img src="product3.jpg" alt="Product 3" onerror="this.style.background='red'; this.innerHTML='Offline';">
            <h2>Product 3</h2>
            <p>$39.99</p>
        </div>
    </div>
    <div id="productView" class="content" style="display: none;"></div>
</body>
</html>
