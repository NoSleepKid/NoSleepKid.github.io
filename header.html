<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoSleepKid.io</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mainfont&display=swap">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Mainfont', sans-serif;
        }

        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .button-container {
            margin-left: auto;
        }

        .testing-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Include header -->
    <div class="header">
        <div class="title" onclick="window.location.href = 'https://Nosleepkid.github.io';">NoSleepKid.io</div>
        <div class="button-container">
            <button class="testing-btn" onclick="window.location.href = 'gamenet.html';">GameNet</button>
        </div>
    </div>
</body>
</html>
