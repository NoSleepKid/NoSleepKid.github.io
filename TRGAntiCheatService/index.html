<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRG AntiCheat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mainfont&display=swap">
    <style>
        body {
            background-image: url('bg.png');
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Mainfont', sans-serif;
        }

        @font-face {
            font-family: 'Avalon';
            src: url('Avalon.ttf') format('truetype');
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .main-content {
            cursor: pointer;
            font-size: 20px;
        }

        .testing-text {
            color: white;
            padding: 20px 30px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 40px;
            margin-top: 20px;
            cursor: pointer;
            position: absolute;
            top: 38%; /* Adjust as needed */
            left: 50%; /* Adjust as needed */
            transform: translate(-50%, -50%);
            font-family: 'Avalon', sans-serif; /* Specify Damifontcolour-Regular font */
        }

        .loading-gif {
            display: block;
            margin: auto;
        }

        .download-btn {
            background-image: url('btn.png');
            background-size: cover;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Main content of main.html -->
    <div class="testing-text">The Anti-Cheat Will Be Handled In The Game Client</div>
    <!-- GIF -->
    <img class="loading-gif" src="Loading.gif" alt="Loading...">
    <!-- New button -->
    <div style="display: flex; justify-content: center;">
    </div>
    <script>
        function SayHi() {
            alert('This is a test alert');
        }

        function VerifyPlayerSpeed(speed) {
            if (speed > 55)
            {
                alert('CHEATINGPLAYERSPEED');
            }
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'g' || event.key === 'G') {
                SayHi();
            }
        });
    </script>
</body>
</html>
