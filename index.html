<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page - NoSleepKid.io</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mainfont&display=swap">
    <style>
        body {
            background-image: url('bg.png');
            background-size: cover;
            margin: 0;
            padding: 0;
            font-family: 'Mainfont', sans-serif;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .main-content {
            cursor: pointer;
            font-size: 20px;
        }

        .testing-btn {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        /* New button style */
        .download-btn {
            background-image: url('btn.png');
            background-size: cover;
            border: none;
            color: white;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Include header -->
    <div class="header">
        <div class="main-content" onclick="window.location.href = 'https://nosleepkid.github.io';">NoSleepKid.io</div>
        <button class="testing-btn" onclick="window.location.href = 'https://nosleepkid.github.io/GameNet';">GameNet</button>
    </div>
    <!-- Main content of main.html -->
    <!-- New button -->
    <div style="display: flex; justify-content: center;">
    </div>
</body>
</html>
